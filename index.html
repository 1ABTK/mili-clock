<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mili Clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
    <div class="app-wrapper">
        <nav class="controls">
            <div class="control-group">
                <div class="select-wrapper">
                    <select id="timezone-select" class="gh-select"></select>
                </div>
                <div class="select-wrapper">
                    <select id="size-select" class="gh-select">
                        <option value="size-large" selected>Bigger</option>
                        <option value="size-medium">Medium</option>
                        <option value="size-small">Small</option>
                    </select>
                </div>
            </div>

            <div class="control-group">
                <label class="toggle-item">
                    <input type="checkbox" id="theme-toggle">
                    <span>Dark Mode</span>
                </label>
                <label class="toggle-item">
                    <input type="checkbox" id="wake-toggle">
                    <span>Stay Awake</span>
                </label>
                <button id="fullscreen-btn" class="gh-btn">
                    <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M3.75 2h3.5a.75.75 0 0 1 0 1.5h-3.5a.25.25 0 0 0-.25.25v3.5a.75.75 0 0 1-1.5 0v-3.5C2 2.784 2.784 2 3.75 2Zm8.5 0h-3.5a.75.75 0 0 0 0 1.5h3.5a.25.25 0 0 1 .25.25v3.5a.75.75 0 0 0 1.5 0v-3.5C14 2.784 13.216 2 12.25 2ZM2.75 8.75a.75.75 0 0 1 .75.75v3.5c0 .138.112.25.25.25h3.5a.75.75 0 0 1 0 1.5h-3.5C2.784 14.75 2 13.966 2 13v-3.5a.75.75 0 0 1 .75-.75Zm10.5 0a.75.75 0 0 1 .75.75V13c0 .966-.784 1.75-1.75 1.75h-3.5a.75.75 0 0 1 0-1.5h3.5a.25.25 0 0 0 .25-.25v-3.5a.75.75 0 0 1 .75-.75Z"></path></svg>
                    <span>Full Screen</span>
                </button>
            </div>
        </nav>

        <main class="clock-body size-large" id="clock-main">
            <div class="format-note">Format: HH:MM:SS:MS</div>
            <div class="display">
                <span id="time">00:00:00</span><span id="ms">:000</span>
            </div>
            <div id="date-display" class="date-text">Loading...</div>
            <div id="wake-status" class="status-indicator"></div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
